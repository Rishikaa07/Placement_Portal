{% extends 'base.html' %}

{% block title %}Edit Placement Drive - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="form-section">
            <h2 class="section-title text-center">Edit Placement Drive</h2>
            
            <form method="POST" action="/company/edit-drive/{{ drive.id }}">
                <div class="mb-3">
                    <label for="job_title" class="form-label">Job Title:</label>
                    <input type="text" class="form-control" name="job_title" id="job_title" value="{{ drive.job_title }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="job_description" class="form-label">Job Description:</label>
                    <textarea class="form-control" name="job_description" id="job_description" rows="5" required>{{ drive.job_description }}</textarea>
                </div>
                
                <div class="mb-3">
                    <label for="eligibility_criteria" class="form-label">Eligibility Criteria:</label>
                    <textarea class="form-control" name="eligibility_criteria" id="eligibility_criteria" rows="4">{{ drive.eligibility_criteria if drive.eligibility_criteria else '' }}</textarea>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="ctc" class="form-label">CTC (in LPA):</label>
                        <input type="number" class="form-control" name="ctc" id="ctc" step="0.1" min="0" value="{{ drive.ctc if drive.ctc else '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="positions" class="form-label">Number of Positions:</label>
                        <input type="number" class="form-control" name="positions" id="positions" value="{{ drive.positions }}" min="1">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="application_deadline" class="form-label">Application Deadline:</label>
                    <input type="datetime-local" class="form-control" name="application_deadline" id="application_deadline" value="{{ drive.application_deadline.strftime('%Y-%m-%dT%H:%M') if drive.application_deadline else '' }}">
                </div>
                
                <div class="alert alert-info">
                    <strong>Approval Status:</strong> {{ drive.approval_status }}
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Update Drive</button>
                    </div>
                    <div class="col-md-6">
                        <a href="/company/drives" class="btn btn-outline-secondary w-100">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
