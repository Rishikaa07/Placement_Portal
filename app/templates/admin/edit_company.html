{% extends 'base.html' %}

{% block title %}Edit Company - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="form-section">
            <h2 class="section-title">Edit Company Profile</h2>
            <form method="POST" action="/admin/edit-company/{{ company.id }}">
                <div class="mb-3">
                    <label for="company_name" class="form-label">Company Name</label>
                    <input type="text" class="form-control" id="company_name" name="company_name"
                        value="{{ company.company_name }}" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ company.email }}"
                        required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="hr_name" class="form-label">HR Contact Name</label>
                        <input type="text" class="form-control" id="hr_name" name="hr_name"
                            value="{{ company.hr_name }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="hr_contact" class="form-label">HR Contact Number</label>
                        <input type="tel" class="form-control" id="hr_contact" name="hr_contact"
                            value="{{ company.hr_contact }}" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="website" class="form-label">Company Website</label>
                    <input type="url" class="form-control" id="website" name="website"
                        value="{{ company.website if company.website else '' }}">
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Company Description</label>
                    <textarea class="form-control" id="description" name="description"
                        rows="4">{{ company.description if company.description else '' }}</textarea>
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <a href="/admin/companies" class="btn btn-secondary me-md-2">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
