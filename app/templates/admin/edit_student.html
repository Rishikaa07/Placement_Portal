{% extends 'base.html' %}

{% block title %}Edit Student - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="form-section">
            <h2 class="section-title">Edit Student Profile</h2>
            <form method="POST" action="/admin/edit-student/{{ student.id }}">
                <div class="mb-3">
                    <label for="roll_number" class="form-label">Roll Number</label>
                    <input type="text" class="form-control" id="roll_number" name="roll_number"
                        value="{{ student.roll_number }}" readonly>
                    <small class="text-muted">Roll number cannot be changed.</small>
                </div>
                <div class="mb-3">
                    <label for="full_name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="full_name" name="full_name"
                        value="{{ student.full_name }}" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ student.email }}"
                        required>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" name="phone"
                            value="{{ student.phone if student.phone else '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="cgpa" class="form-label">CGPA</label>
                        <input type="number" step="0.01" min="0" max="10" class="form-control" id="cgpa" name="cgpa"
                            value="{{ student.cgpa if student.cgpa else '' }}">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="branch" class="form-label">Branch</label>
                        <select class="form-select" id="branch" name="branch">
                            <option value="">Select Branch</option>
                            <option value="Computer Science" {% if student.branch=='Computer Science' %}selected{% endif
                                %}>Computer Science</option>
                            <option value="Information Technology" {% if student.branch=='Information Technology'
                                %}selected{% endif %}>Information Technology</option>
                            <option value="Electronics" {% if student.branch=='Electronics' %}selected{% endif %}>
                                Electronics</option>
                            <option value="Mechanical" {% if student.branch=='Mechanical' %}selected{% endif %}>
                                Mechanical</option>
                            <option value="Civil" {% if student.branch=='Civil' %}selected{% endif %}>Civil</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="semester" class="form-label">Semester</label>
                        <select class="form-select" id="semester" name="semester">
                            <option value="">Select Semester</option>
                            {% for i in range(1, 9) %}
                            <option value="{{ i }}" {% if student.semester==i %}selected{% endif %}>Semester {{ i }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <a href="/admin/students" class="btn btn-secondary me-md-2">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
