{% extends 'base.html' %}

{% block title %}Company Registration - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="form-section">
            <h2 class="section-title text-center">Company Registration</h2>
            
            <form method="POST" action="/auth/register-company">
                <div class="mb-3">
                    <label for="company_name" class="form-label">Company Name:</label>
                    <input type="text" class="form-control" name="company_name" id="company_name" required>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address:</label>
                    <input type="email" class="form-control" name="email" id="email" required>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" class="form-control" name="password" id="password" required>
                </div>
                
                <div class="mb-3">
                    <label for="hr_name" class="form-label">HR Contact Name:</label>
                    <input type="text" class="form-control" name="hr_name" id="hr_name" required>
                </div>
                
                <div class="mb-3">
                    <label for="hr_contact" class="form-label">HR Contact Number:</label>
                    <input type="tel" class="form-control" name="hr_contact" id="hr_contact" required>
                </div>
                
                <div class="mb-3">
                    <label for="website" class="form-label">Website:</label>
                    <input type="url" class="form-control" name="website" id="website">
                </div>
                
                <div class="mb-3">
                    <label for="description" class="form-label">Company Description:</label>
                    <textarea class="form-control" name="description" id="description" rows="4" placeholder="Brief description about your company..."></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">Register Company</button>
                
                <p class="text-center" style="color: #666; font-size: 0.9rem;">
                    Already have an account? <a href="/auth/login">Login here</a>
                </p>
                
                <div style="margin-top: 20px; padding: 15px; background-color: #e8f4f8; border-radius: 8px; border-left: 4px solid var(--secondary-color); font-size: 0.9rem; color: #333;">
                    <strong>Note:</strong> Your company registration will be reviewed by the admin. You can log in after approval.
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
