{% extends 'base.html' %}

{% block title %}Login - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="form-section">
            <h2 class="section-title text-center">Login</h2>
            
            <form method="POST" action="/auth/login">
                <div class="mb-3">
                    <label for="user_type" class="form-label">Login As:</label>
                    <select class="form-select" name="user_type" id="user_type" required>
                        <option value="student">Student</option>
                        <option value="company">Company</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address:</label>
                    <input type="email" class="form-control" name="email" id="email" required>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" class="form-control" name="password" id="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>
            </form>
            
            <div class="row mt-4 text-center">
                <div class="col-12">
                    <p style="color: #666; font-size: 0.9rem;">Don't have an account?</p>
                </div>
            </div>
            
            <div class="row">
                <div class="col-6">
                    <a href="/auth/register-student" class="btn btn-outline-primary w-100" style="border-width: 2px;">
                        <strong>Student</strong>
                    </a>
                </div>
                <div class="col-6">
                    <a href="/auth/register-company" class="btn btn-outline-info w-100" style="border-width: 2px;">
                        <strong>Company</strong>
                    </a>
                </div>
            </div>
            
            <div style="margin-top: 25px; padding: 15px; background-color: #f0f0f0; border-radius: 8px; font-size: 0.9rem; color: #666;">
                <strong>Demo Admin Credentials:</strong><br>
                Email: admin@placement.edu<br>
                Password: admin123
            </div>
        </div>
    </div>
</div>
{% endblock %}
