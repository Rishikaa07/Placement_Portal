{% extends 'base.html' %}

{% block title %}Student Registration - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="form-section">
            <h2 class="section-title text-center">Student Registration</h2>
            
            <form method="POST" action="/auth/register-student">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="roll_number" class="form-label">Roll Number:</label>
                        <input type="text" class="form-control" name="roll_number" id="roll_number" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="full_name" class="form-label">Full Name:</label>
                        <input type="text" class="form-control" name="full_name" id="full_name" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address:</label>
                    <input type="email" class="form-control" name="email" id="email" required>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" class="form-control" name="password" id="password" required>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="phone" class="form-label">Phone Number:</label>
                        <input type="tel" class="form-control" name="phone" id="phone">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="cgpa" class="form-label">CGPA:</label>
                        <input type="number" class="form-control" name="cgpa" id="cgpa" step="0.01" min="0" max="10">
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="branch" class="form-label">Branch:</label>
                        <select class="form-select" name="branch" id="branch">
                            <option value="">Select Branch</option>
                            <option value="CSE">Computer Science</option>
                            <option value="IT">Information Technology</option>
                            <option value="ECE">Electronics</option>
                            <option value="ME">Mechanical</option>
                            <option value="CE">Civil</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="semester" class="form-label">Semester:</label>
                        <select class="form-select" name="semester" id="semester">
                            <option value="">Select Semester</option>
                            <option value="6">6th</option>
                            <option value="7">7th</option>
                            <option value="8">8th</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">Register</button>
                
                <p class="text-center" style="color: #666; font-size: 0.9rem;">
                    Already have an account? <a href="/auth/login">Login here</a>
                </p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
