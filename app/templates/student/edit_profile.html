{% extends 'base.html' %}

{% block title %}Edit Profile - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="form-section">
            <h2 class="section-title text-center">Edit Profile</h2>
            
            <form method="POST" action="/student/edit-profile" enctype="multipart/form-data">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="roll_number" class="form-label">Roll Number:</label>
                        <input type="text" class="form-control" value="{{ student.roll_number }}" disabled>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="full_name" class="form-label">Full Name:</label>
                        <input type="text" class="form-control" name="full_name" id="full_name" value="{{ student.full_name }}" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address:</label>
                    <input type="email" class="form-control" name="email" id="email" value="{{ student.email }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number:</label>
                    <input type="tel" class="form-control" name="phone" id="phone" value="{{ student.phone if student.phone else '' }}">
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="cgpa" class="form-label">CGPA:</label>
                        <input type="number" class="form-control" name="cgpa" id="cgpa" step="0.01" min="0" max="10" value="{{ student.cgpa if student.cgpa else '' }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="branch" class="form-label">Branch:</label>
                        <select class="form-select" name="branch" id="branch">
                            <option value="">Select Branch</option>
                            <option value="CSE" {% if student.branch == 'CSE' %}selected{% endif %}>Computer Science</option>
                            <option value="IT" {% if student.branch == 'IT' %}selected{% endif %}>Information Technology</option>
                            <option value="ECE" {% if student.branch == 'ECE' %}selected{% endif %}>Electronics</option>
                            <option value="ME" {% if student.branch == 'ME' %}selected{% endif %}>Mechanical</option>
                            <option value="CE" {% if student.branch == 'CE' %}selected{% endif %}>Civil</option>
                            <option value="Other" {% if student.branch == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="semester" class="form-label">Semester:</label>
                    <select class="form-select" name="semester" id="semester">
                        <option value="">Select Semester</option>
                        <option value="6" {% if student.semester == 6 %}selected{% endif %}>6th</option>
                        <option value="7" {% if student.semester == 7 %}selected{% endif %}>7th</option>
                        <option value="8" {% if student.semester == 8 %}selected{% endif %}>8th</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="resume" class="form-label">Resume (PDF, DOC, DOCX):</label>
                    <input type="file" class="form-control" name="resume" id="resume" accept=".pdf,.doc,.docx">
                    {% if student.resume_path %}
                        <small class="text-muted d-block mt-2">✓ Resume uploaded: {{ student.resume_path }}</small>
                    {% endif %}
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Update Profile</button>
                    </div>
                    <div class="col-md-6">
                        <a href="/student/dashboard" class="btn btn-outline-secondary w-100">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
